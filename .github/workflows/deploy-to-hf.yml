name: Build & Deploy QIDS to Hugging Face Space

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      HF_USER: Cosmographer
      HF_SPACE: QIDS
      HF_TOKEN: ${{ secrets.Git-HF-Deploy }}

    steps:
      # 1️⃣ Checkout source code
      - name: Checkout GitHub repo
        uses: actions/checkout@v4

      # 2️⃣ Setup Node for Vite build
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build Vite app
      - name: Build frontend (Vite)
        run: npm run build

      # 5️⃣ Verify dist exists (hard fail if not)
      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ dist/ directory not found. Build failed."
            exit 1
          fi
          echo "✅ dist/ directory found"
          ls -la dist

      # 6️⃣ Clone Hugging Face Space repo
      - name: Clone HF Space
        run: |
          git clone https://huggingface.co/spaces/${HF_USER}/${HF_SPACE} hf-space

      # 7️⃣ Sync dist → HF Space root
      - name: Sync build to HF Space
        run: |
          rsync -av --delete dist/ hf-space/

      # 8️⃣ Commit & push to HF Space
      - name: Push to Hugging Face Space
        run: |
          cd hf-space
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Auto deploy QIDS build ($GITHUB_SHA)" || echo "No changes to commit"
          git push https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/${HF_USER}/${HF_SPACE}.git HEAD:main

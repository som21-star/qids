name: Mirror to Hugging Face Space
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install git
        run: sudo apt-get update && sudo apt-get install -y git
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install huggingface_hub
        run: pip install huggingface_hub
      - name: Configure git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GH Action - HF Mirror"
      - name: Clone HF Space
        env:
          HF_TOKEN: ${{ secrets.Git-HF-Deploy }}
        run: |
          git clone https://huggingface.co/spaces/Cosmographer/QIDS hf-space
          rsync -av --delete ./ hf-space/  # copy everything into space folder
          cd hf-space
          git add .
          git commit -m "Mirror from GitHub: $GITHUB_SHA" || echo "No changes"
          # push using token auth
          git push https://Cosmographer:${Git-HF-Deploy}@huggingface.co/spaces/Cosmographer/QIDS.git HEAD:main

